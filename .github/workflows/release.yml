name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Tag to build (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.version) || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build universal app
        env:
          # Ad-hoc sign (no Apple Developer cert required). Override via repo secret for notarized builds.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}
        run: npm run tauri build -- --target universal-apple-darwin --bundles app,dmg

      - name: Locate DMG
        id: dmg
        run: |
          set -euo pipefail
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
          VERSION="${TAG#v}"
          OUT="Trivor-${VERSION}-macOS.dmg"
          ROOT="target/universal-apple-darwin/release/bundle"
          if [ ! -d "$ROOT" ]; then
            ROOT="target/release/bundle"
          fi
          DMG=$(find "$ROOT" -maxdepth 2 -name '*.dmg' -print | head -1)
          if [ -z "$DMG" ]; then
            echo "No .dmg found under $ROOT"
            find "$ROOT" -type f 2>/dev/null || true
            exit 1
          fi
          cp "$DMG" "./${OUT}"
          ls -lh "./${OUT}"
          echo "path=${OUT}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        run: |
          set -euo pipefail
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
          VERSION="${TAG#v}"
          chmod +x scripts/changelog-extract.sh
          ./scripts/changelog-extract.sh "$VERSION" > release-notes.md
          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "No CHANGELOG section for ${VERSION}" >&2
            exit 1
          fi
          echo "--- release notes ---"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          name: Trivor ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          body_path: release-notes.md
          files: ${{ steps.dmg.outputs.path }}
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name, '-') }}
          make_latest: true
          overwrite_files: true
