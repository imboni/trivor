name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build universal app and DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Package release artifacts
        run: |
          BUNDLE="target/universal-apple-darwin/release/bundle/macos"
          mkdir -p release-artifacts
          cp -R "$BUNDLE"/*.app release-artifacts/ 2>/dev/null || cp -R target/release/bundle/macos/*.app release-artifacts/
          cp "$BUNDLE"/*.dmg release-artifacts/ 2>/dev/null || cp target/release/bundle/macos/*.dmg release-artifacts/ || true
          cd release-artifacts && zip -r ../Trivor-macos-universal.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*
            Trivor-macos-universal.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
