<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0f;
      overflow: hidden;
    }
    model-viewer {
      width: 100%;
      height: 100%;
      --poster-color: transparent;
    }
    #status {
      position: absolute;
      left: 12px;
      bottom: 12px;
      color: #c4b5fd;
      font: 12px system-ui, sans-serif;
      pointer-events: none;
      z-index: 2;
      max-width: 90%;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <model-viewer
    id="mv"
    camera-controls
    touch-action="pan-y"
    shadow-intensity="1"
    exposure="1"
    interaction-prompt="auto"
    ar-modes=""
  ></model-viewer>
  <div id="status">Initializing…</div>
  <script type="module">
    import "trivor://viewer/model-viewer.min.js";

    const status = document.getElementById("status");
    const setStatus = (text) => { status.textContent = text; };

    window.trivorReady = customElements.whenDefined("model-viewer");

    window.trivorLoadModel = async (url) => {
      await window.trivorReady;
      const mv = document.getElementById("mv");
      setStatus("Loading model…");

      try {
        const res = await fetch(url);
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }
        const blob = await res.blob();
        const objectUrl = URL.createObjectURL(blob);
        await new Promise((resolve, reject) => {
          const onLoad = () => {
            URL.revokeObjectURL(objectUrl);
            setStatus("");
            resolve();
          };
          const onError = (e) => {
            URL.revokeObjectURL(objectUrl);
            reject(e);
          };
          mv.addEventListener("load", onLoad, { once: true });
          mv.addEventListener("error", onError, { once: true });
          mv.src = objectUrl;
        });
      } catch (err) {
        console.error("trivorLoadModel failed", err);
        setStatus(`Failed to load model: ${err}`);
      }
    };

    window.trivorReset = async () => {
      await window.trivorReady;
      const mv = document.getElementById("mv");
      mv.removeAttribute("src");
      setStatus("");
    };

    window.trivorReady.then(() => setStatus("Ready"));
  </script>
</body>
</html>
